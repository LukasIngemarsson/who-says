<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhoSays API Uploader</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2em;
        background: #f4f4f4;
      }
      .container {
        max-width: 600px;
        margin: auto;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      input[type='file'] {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #0056b3;
      }
      #status {
        margin-top: 15px;
        font-weight: bold;
      }
      #results {
        margin-top: 20px;
        background: #222;
        color: #0f0;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Upload Audio for Diarization</h2>
      <form id="upload-form">
        <div>
          <label for="file">Audio File:</label><br />
          <input type="file" id="file" name="file" accept="audio/*" required />
        </div>
        <div>
          <label for="num_speakers">Number of Speakers:</label><br />
          <input
            type="number"
            id="num_speakers"
            name="num_speakers"
            value="2"
            min="1"
            style="width: 50px"
          />
        </div>
        <button type="submit" id="submit-button">Process Audio</button>
      </form>

      <div id="status"></div>
      <pre id="results"></pre>
    </div>

    <script>
      const form = document.getElementById('upload-form');
      const statusDiv = document.getElementById('status');
      const resultsPre = document.getElementById('results');
      const submitButton = document.getElementById('submit-button');

      form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Stop the form from submitting normally

        const fileInput = document.getElementById('file');
        const speakersInput = document.getElementById('num_speakers');

        if (!fileInput.files[0]) {
          statusDiv.textContent = 'Please select a file first.';
          statusDiv.style.color = 'red';
          return;
        }

        // Show loading state
        statusDiv.textContent =
          'Uploading and processing... This may take a moment.';
        statusDiv.style.color = 'blue';
        resultsPre.style.display = 'none';
        submitButton.disabled = true;

        // Create FormData to send file
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('num_speakers', speakersInput.value);

        try {
          const response = await fetch('/process', {
            method: 'POST',
            body: formData,
          });

          const results = await response.json();

          if (!response.ok) {
            // Show error message from API
            throw new Error(results.error || 'An unknown error occurred');
          }

          // Success! Display the JSON results
          statusDiv.textContent = 'Processing complete!';
          statusDiv.style.color = 'green';
          resultsPre.textContent = JSON.stringify(results, null, 2); // Pretty-print JSON
          resultsPre.style.display = 'block';
        } catch (error) {
          console.error('Error:', error);
          statusDiv.textContent = `Error: ${error.message}`;
          statusDiv.style.color = 'red';
        } finally {
          // Re-enable the button
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
