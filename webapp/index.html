<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Who Says Webapp</title>
    <style>
        .slider-container {
            margin: 20px 0;
        }
        .slider-label {
            margin-bottom: 5px;
            display: block;
        }
        .slider-value {
            margin-left: 10px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 300px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Who Says Webapp</h1>
    <p>This is a basic HTML page.</p>

    <div class="slider-container">
        <label class="slider-label" for="slider1">Slider 1: <span id="value1" class="slider-value">50</span></label>
        <input type="range" id="slider1" min="0" max="100" value="50">
    </div>
    <div class="slider-container">
        <label class="slider-label" for="slider2">Slider 2: <span id="value2" class="slider-value">25</span></label>
        <input type="range" id="slider2" min="0" max="50" value="25">
    </div>

    <script>
        const slider1 = document.getElementById('slider1');
        const value1 = document.getElementById('value1');
        slider1.addEventListener('input', function() {
            value1.textContent = slider1.value;
        });

        const slider2 = document.getElementById('slider2');
        const value2 = document.getElementById('value2');
        slider2.addEventListener('input', function() {
            value2.textContent = slider2.value;
        });
    </script>
</body>
</html>
